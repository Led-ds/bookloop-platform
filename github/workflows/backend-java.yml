name: backend-java

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nome da imagem no DockerHub (ex.: org/servico-backend)"
        required: true
        type: string
      java_version:
        description: "Versão do Java"
        required: false
        default: "21"
        type: string
      context:
        description: "Contexto de build Docker"
        required: false
        default: "."
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven

      - name: Build
        run: mvn -B -ntp clean package -DskipTests

      - name: Test
        run: mvn -B -ntp test

      - name: Set image tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker build
        run: |
          docker build -t "${{ inputs.image_name }}:${{ steps.meta.outputs.sha }}" \
                       -t "${{ inputs.image_name }}:latest" \
                       "${{ inputs.context }}"

      - name: Login DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push DockerHub
        if: github.event_name == 'push'
        run: |
          docker push "${{ inputs.image_name }}:${{ steps.meta.outputs.sha }}"
          docker push "${{ inputs.image_name }}:latest"

      # --- Evolução (v1.x): acionar deploy no App Runner via Terraform/CLI ---
      # - name: Deploy AWS (App Runner)
      #   if: github.ref == 'refs/heads/main'
      #   run: echo "TODO: promover imagem ${{ steps.meta.outputs.sha }} no ambiente alvo"
