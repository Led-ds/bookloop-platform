name: frontend-react

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nome da imagem no DockerHub (ex.: org/servico-frontend)"
        required: true
        type: string
      node_version:
        description: "Versão do Node"
        required: false
        default: "20"
        type: string
      vite_api_url:
        description: "Base da API injetada no build (VITE_API_URL)"
        required: false
        default: ""
        type: string
      context:
        description: "Contexto de build Docker"
        required: false
        default: "."
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ inputs.vite_api_url }}

      - name: Set image tags
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker build
        run: |
          docker build --build-arg VITE_API_URL="${{ inputs.vite_api_url }}" \
                       -t "${{ inputs.image_name }}:${{ steps.meta.outputs.sha }}" \
                       -t "${{ inputs.image_name }}:latest" \
                       "${{ inputs.context }}"

      - name: Login DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push DockerHub
        if: github.event_name == 'push'
        run: |
          docker push "${{ inputs.image_name }}:${{ steps.meta.outputs.sha }}"
          docker push "${{ inputs.image_name }}:latest"

      # --- Evolução (v1.x): deploy no App Runner ---
